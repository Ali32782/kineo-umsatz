<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kineo Analytics</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <style>
    @font-face {
      font-family: 'Roboto Condensed';
      src: url('/fonts/RobotoCondensed-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Roboto Condensed';
      src: url('/fonts/RobotoCondensed-Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Roboto';
      src: url('/fonts/Roboto-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Roboto';
      src: url('/fonts/Roboto-SemiBold.ttf') format('truetype');
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }

    /* Farben & Typo von kineo-physiotherapie.ch */
    :root {
      --kineo-dark: #0a2734;
      --kineo-primary: #004869;
      --kineo-accent: #fa4616;
      --kineo-bg: #f9f7ed;
      --kineo-neutral: #e0ded1;
      --kineo-text: #0a2734;
      --font-display: 'Roboto Condensed', sans-serif;
      --font-body: 'Roboto', sans-serif;
      --radius: 10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }

    body {
      font-family: var(--font-body);
      background: var(--kineo-bg);
      color: var(--kineo-text);
      -webkit-font-smoothing: antialiased;
      font-size: 14px;
      line-height: 1.5;
    }

    h1, h2, h3, h4 {
      font-family: var(--font-display) !important;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--kineo-dark);
      line-height: 1.2;
      text-transform: uppercase;
    }

    table { border-collapse: collapse; width: 100%; }
    th { font-family: var(--font-display); font-weight: 700; letter-spacing: 0.04em; }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--kineo-bg); }
    ::-webkit-scrollbar-thumb { background: var(--kineo-neutral); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--kineo-primary); }

    input:focus, select:focus, textarea:focus {
      outline: 2px solid var(--kineo-primary);
      outline-offset: 1px;
    }
    button:focus-visible { outline: 2px solid var(--kineo-primary); outline-offset: 2px; }

    input, select, textarea, button {
      font-family: var(--font-body);
      font-size: 13px;
    }
    input[type=range] { accent-color: var(--kineo-primary); }
    ::selection { background: #00486928; color: var(--kineo-dark); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
