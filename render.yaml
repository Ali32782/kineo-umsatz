databases:
  - name: kineo-db
    databaseName: kineo
    user: kineo
    plan: free

services:
  - type: web
    name: kineo-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ENV
        value: production
      - key: DATA_DIR
        value: /tmp/kineo-data
      - key: EXPORTS_DIR
        value: /tmp/exports
      - key: DATABASE_URL
        fromDatabase:
          name: kineo-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CRON_SECRET
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: kineo@kineo.swiss
      - key: CEO_EMAILS
        value: ali.peters@kineo.swiss,sereina.urech@kineo.swiss
      - key: APP_BASE_URL
        value: https://kineo-leadership.onrender.com
      - key: CORS_ORIGINS
        value: https://kineo-leadership.onrender.com

  - type: web
    name: kineo-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: kineo-backend
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
