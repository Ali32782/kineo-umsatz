services:
  # Backend (FastAPI)
  - type: web
    name: kineo-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ENV
        value: production
    disk:
      name: kineo-data
      mountPath: /app/data
      sizeGB: 1

  # Frontend (React → static site)
  - type: web
    name: kineo-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
